<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>学びのポータル｜算数のしあげ</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;800;900&display=swap');
  :root {
    --blue:#2d7dd2; --blue-dark:#1a5fa8; --blue-light:#6ab4f5;
    --white:#ffffff; --gray:#6b7280; --text:#1e293b;
    --radius:18px;
    --shadow:0 4px 20px rgba(45,125,210,.15);
    --shadow-lg:0 8px 32px rgba(45,125,210,.25);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'M PLUS Rounded 1c',sans-serif;background:linear-gradient(160deg,#dbeafe,#ede9fe 50%,#d1fae5);min-height:100vh;color:var(--text);overflow-x:hidden}

  /* Header */
  .header{background:var(--white);box-shadow:0 2px 12px rgba(45,125,210,.12);padding:14px 20px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100}
  .header-icon{font-size:1.8rem;animation:spin 8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .header h1{font-size:1.3rem;font-weight:900;color:var(--blue)}
  .header-sub{font-size:.75rem;color:var(--gray);margin-top:2px}
  .breadcrumb{margin-left:auto;font-size:.82rem;color:var(--blue);font-weight:700}

  /* Layout */
  .main{max-width:880px;margin:0 auto;padding:28px 16px 60px}
  .screen{display:none}.screen.active{display:block}
  @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

  /* Home */
  .hero{text-align:center;margin-bottom:32px;animation:fadeUp .5s ease}
  .hero-emoji{font-size:3.5rem;display:block;margin-bottom:10px}
  .hero h2{font-size:1.6rem;font-weight:900;color:var(--blue-dark);margin-bottom:6px}
  .hero p{color:var(--gray);font-size:.95rem}

  .howto{background:var(--white);border-radius:var(--radius);padding:18px 20px;margin-bottom:28px;box-shadow:var(--shadow);display:flex;gap:12px;flex-wrap:wrap;align-items:center}
  .howto-step{display:flex;align-items:center;gap:8px;flex:1;min-width:150px}
  .step-num{width:32px;height:32px;border-radius:50%;background:var(--blue);color:#fff;font-weight:900;font-size:1rem;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .step-text{font-size:.85rem;font-weight:700}
  .step-arrow{color:var(--blue-light);font-size:1.1rem;flex-shrink:0}

  .sec-title{font-size:1rem;font-weight:900;color:var(--blue-dark);margin-bottom:14px;padding-left:10px;border-left:4px solid var(--blue)}

  .tobira-card{background:linear-gradient(135deg,#1e40af,#2d7dd2);border-radius:var(--radius);padding:20px;margin-bottom:28px;color:#fff;display:flex;align-items:center;gap:16px;cursor:pointer;transition:transform .2s,box-shadow .2s;box-shadow:0 6px 24px rgba(29,64,175,.3);animation:fadeUp .5s ease}
  .tobira-card:hover{transform:translateY(-3px);box-shadow:0 10px 32px rgba(29,64,175,.4)}
  .tobira-icon{font-size:2.5rem;flex-shrink:0}
  .tobira-text h3{font-size:1.2rem;font-weight:900;margin-bottom:3px}
  .tobira-text p{font-size:.8rem;opacity:.85}
  .tobira-arrow{margin-left:auto;font-size:1.3rem;flex-shrink:0}

  .lesson-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin-bottom:36px;animation:fadeUp .5s ease}
  .lesson-card{background:var(--white);border-radius:var(--radius);padding:16px 10px;text-align:center;cursor:pointer;transition:transform .2s,box-shadow .2s;box-shadow:var(--shadow);border:2px solid transparent;position:relative;overflow:hidden}
  .lesson-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:var(--card-color,var(--blue))}
  .lesson-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg);border-color:var(--card-color,var(--blue))}
  .lesson-num{font-size:.68rem;color:var(--gray);margin-bottom:3px}
  .lesson-emoji{font-size:1.6rem;display:block;margin-bottom:6px}
  .lesson-title{font-size:.95rem;font-weight:800;margin-bottom:6px}
  .lesson-topics{font-size:.68rem;color:var(--gray);line-height:1.4}

  /* Attack screen */
  .attack-header{background:var(--white);border-radius:var(--radius);padding:20px;margin-bottom:20px;box-shadow:var(--shadow);display:flex;align-items:center;gap:14px;animation:fadeUp .4s ease}
  .atk-badge{background:var(--blue);color:#fff;padding:7px 14px;border-radius:999px;font-weight:900;font-size:.85rem;flex-shrink:0}
  .atk-topic{font-size:.95rem;font-weight:700}
  .atk-sub{font-size:.75rem;color:var(--gray);margin-top:2px}

  .level-guide{background:var(--white);border-radius:var(--radius);padding:14px 18px;margin-bottom:20px;box-shadow:var(--shadow)}
  .level-guide-title{font-size:.8rem;font-weight:700;color:var(--gray);margin-bottom:8px}
  .level-list{display:flex;gap:6px;flex-wrap:wrap}
  .level-tag{padding:3px 10px;border-radius:999px;font-size:.72rem;font-weight:700;border:2px solid}

  .atk-label{font-size:.95rem;font-weight:900;color:var(--blue-dark);margin-bottom:12px;padding-left:10px;border-left:4px solid var(--blue)}
  .attack-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:16px;animation:fadeUp .4s ease}
  @media(max-width:560px){.attack-grid{grid-template-columns:repeat(3,1fr)}}
  .attack-btn{background:var(--white);border:2px solid #e2e8f0;border-radius:var(--radius);padding:14px 6px;text-align:center;cursor:pointer;transition:all .2s;box-shadow:0 2px 8px rgba(0,0,0,.06)}
  .attack-btn:hover{border-color:var(--btn-color,var(--blue));background:var(--btn-bg,#eff6ff);transform:translateY(-3px);box-shadow:0 6px 20px rgba(0,0,0,.12)}
  .attack-icon{font-size:1.5rem;display:block;margin-bottom:5px}
  .attack-num{font-size:.95rem;font-weight:900;display:block}
  .attack-level{font-size:.65rem;color:var(--gray);margin-top:2px}

  /* Viewer screen */
  .viewer-wrap{animation:fadeUp .35s ease}
  .viewer-toolbar{background:var(--white);border-radius:var(--radius);padding:14px 18px;margin-bottom:16px;box-shadow:var(--shadow);display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .viewer-title{font-size:.95rem;font-weight:700;flex:1;min-width:160px}
  .viewer-btns{display:flex;gap:8px;flex-wrap:wrap}

  /* ③バリアント選択タブ */
  .variant-tabs{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
  .variant-tab{padding:6px 14px;border-radius:999px;border:2px solid #e2e8f0;background:var(--white);font-size:.8rem;font-weight:700;cursor:pointer;transition:all .2s;font-family:inherit}
  .variant-tab.active{border-color:var(--blue);background:var(--blue);color:#fff}
  .variant-tab:hover:not(.active){border-color:var(--blue);color:var(--blue)}

  .img-container{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;text-align:center}
  .img-container img{max-width:100%;height:auto;display:block;margin:0 auto}

  /* Pages viewer (とびら) */
  .pages-container{display:flex;flex-direction:column;gap:12px}
  .pages-container .img-container{border-radius:var(--radius)}

  .back-btn{display:inline-flex;align-items:center;gap:7px;background:var(--white);border:2px solid #e2e8f0;border-radius:999px;padding:9px 18px;font-size:.85rem;font-weight:700;color:var(--text);cursor:pointer;transition:all .2s;font-family:inherit}
  .back-btn:hover{border-color:var(--blue);color:var(--blue);background:#eff6ff}
  .ans-btn{display:inline-flex;align-items:center;gap:6px;background:var(--blue);color:#fff;border:none;border-radius:999px;padding:9px 18px;font-size:.85rem;font-weight:800;cursor:pointer;transition:all .2s;font-family:inherit}
  .ans-btn:hover{background:var(--blue-dark)}

  @media(max-width:560px){
    .lesson-grid{grid-template-columns:repeat(3,1fr)}
    .howto{flex-direction:column}
    .step-arrow{display:none}
  }

  /* ホームへもどるボタン */
  .home-back-btn{position:fixed;bottom:20px;right:20px;z-index:200;
    display:inline-flex;align-items:center;gap:7px;
    background:#2d7dd2;color:#fff;border:none;border-radius:999px;
    padding:11px 20px;font-size:.9rem;font-weight:800;
    box-shadow:0 4px 16px rgba(45,125,210,.4);
    cursor:pointer;text-decoration:none;font-family:inherit;
    transition:transform .2s,box-shadow .2s}
  .home-back-btn:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(45,125,210,.5)}
</style>
</head>
<body>

<header class="header">
  <div class="header-icon">🏆</div>
  <div>
    <h1>学びのポータル</h1>
    <div class="header-sub">算数のしあげ ／ 6年生算数</div>
  </div>
  <div class="breadcrumb" id="breadcrumb"></div>
</header>

<main class="main">

  <!-- Screen: Home -->
  <div class="screen active" id="screen-home">
    <div class="hero">
      <span class="hero-emoji">🏆</span>
      <h2>さんすうのしあげ</h2>
      <p>じぶんのレベルにあった問題にちょうせん！</p>
    </div>
    <div class="howto">
      <div class="howto-step"><div class="step-num">1</div><div class="step-text">時間を えらぶ</div></div>
      <div class="step-arrow">→</div>
      <div class="howto-step"><div class="step-num">2</div><div class="step-text">アタックを えらぶ</div></div>
      <div class="step-arrow">→</div>
      <div class="howto-step"><div class="step-num">3</div><div class="step-text">プリントを見て ノートに書く</div></div>
    </div>
    <div class="tobira-card" onclick="openTobira()">
      <div class="tobira-icon">🚪</div>
      <div class="tobira-text"><h3>学びのとびら</h3><p>単元のまとめプリント（最初に見よう！）</p></div>
      <div class="tobira-arrow">→</div>
    </div>
    <div class="sec-title">時間を選んでね</div>
    <div class="lesson-grid" id="lessonGrid"></div>
  </div>

  <!-- Screen: Attack select -->
  <div class="screen" id="screen-attack">
    <button class="back-btn" onclick="goHome()">← もどる</button>
    <div class="attack-header">
      <div class="atk-badge" id="atkBadge">第1時</div>
      <div><div class="atk-topic" id="atkTopic"></div><div class="atk-sub" id="atkSub"></div></div>
    </div>
    <div class="level-guide">
      <div class="level-guide-title">🎯 アタック番号とレベル</div>
      <div class="level-list">
        <div class="level-tag" style="color:#16a34a;border-color:#16a34a;background:#f0fdf4">① 基本確認</div>
        <div class="level-tag" style="color:#2563eb;border-color:#2563eb;background:#eff6ff">② 理解を深める</div>
        <div class="level-tag" style="color:#d97706;border-color:#d97706;background:#fffbeb">③ 活用（難易度選択あり）</div>
        <div class="level-tag" style="color:#7c3aed;border-color:#7c3aed;background:#f5f3ff">④⑤ 発展・チャレンジ</div>
      </div>
    </div>
    <div class="atk-label">アタックを選んでね</div>
    <div class="attack-grid" id="attackGrid"></div>
  </div>

  <!-- Screen: Viewer -->
  <div class="screen" id="screen-viewer">
    <button class="back-btn" id="viewerBackBtn">← もどる</button>
    <div class="viewer-wrap">
      <div class="viewer-toolbar">
        <div class="viewer-title" id="viewerTitle"></div>
        <div class="viewer-btns">
          <button class="ans-btn" id="answerBtn" style="display:none">答えを見る</button>
        </div>
      </div>
      <div id="variantTabs" class="variant-tabs" style="display:none"></div>
      <div id="imgContainer" class="img-container"></div>
    </div>
  </div>

</main>

const LESSONS = [{"id": "s01", "label": "第1時", "topic": "しあげ", "sub": "6年間の総まとめ", "emoji": "🔁", "color": "#2563eb"}];
const ATTACKS = [
  {num:'①',key:'1',icon:'🌱',level:'基本確認',border:'#16a34a',bg:'#f0fdf4'},
  {num:'②',key:'2',icon:'📖',level:'理解を深める',border:'#2563eb',bg:'#eff6ff'},
  {num:'③',key:'3',icon:'⚙️',level:'活用',border:'#d97706',bg:'#fffbeb'},
  {num:'④',key:'4',icon:'🚀',level:'発展',border:'#7c3aed',bg:'#f5f3ff'},
  {num:'⑤',key:'5',icon:'👑',level:'チャレンジ',border:'#e11d48',bg:'#fff1f2'},
];

let currentLesson = null;

/* ---- build home ---- */
function buildLessonGrid() {
  const grid = document.getElementById('lessonGrid');
  LESSONS.forEach(l => {
    const c = document.createElement('div');
    c.className = 'lesson-card';
    c.style.setProperty('--card-color', l.color);
    c.innerHTML = `<div class="lesson-num">${l.label}</div>
      <span class="lesson-emoji">${l.emoji}</span>
      <div class="lesson-title">${l.label.replace('第','').replace('時','時間目')}</div>
      <div class="lesson-topics">${l.topic}</div>`;
    c.onclick = () => selectLesson(l);
    grid.appendChild(c);
  });
}

/* ---- lesson → attack screen ---- */
function selectLesson(lesson) {
  currentLesson = lesson;
  document.getElementById('atkBadge').textContent = lesson.label;
  document.getElementById('atkTopic').textContent = lesson.topic;
  document.getElementById('atkSub').textContent = lesson.sub;

  const grid = document.getElementById('attackGrid');
  grid.innerHTML = '';
  const lessonData = IMG_DATA[lesson.id];

  ATTACKS.forEach(atk => {
    const btn = document.createElement('div');
    btn.className = 'attack-btn';
    btn.style.setProperty('--btn-color', atk.border);
    btn.style.setProperty('--btn-bg', atk.bg);
    const hasData = lessonData && lessonData.attacks && lessonData.attacks[atk.key];
    btn.style.opacity = hasData ? '1' : '0.4';
    btn.innerHTML = `<span class="attack-icon">${atk.icon}</span>
      <span class="attack-num">アタック${atk.num}</span>
      <div class="attack-level">${atk.level}</div>`;
    if (hasData) btn.onclick = () => openAttack(lesson, atk);
    grid.appendChild(btn);
  });

  setBreadcrumb(lesson.label);
  showScreen('attack');
}

/* ---- open viewer ---- */
function openAttack(lesson, atk) {
  const lessonData = IMG_DATA[lesson.id];
  const imgs = lessonData.attacks[atk.key];
  const title = `${lesson.label} ｜ アタック${atk.num} ｜ ${lesson.topic}`;

  document.getElementById('viewerTitle').textContent = title;
  const ansBtn = document.getElementById('answerBtn');
  if (ansBtn) {
    const hasAns = IMG_DATA[lesson.id] && IMG_DATA[lesson.id].answers && IMG_DATA[lesson.id].answers[atk.key] && IMG_DATA[lesson.id].answers[atk.key].length > 0;
    ansBtn.style.display = hasAns ? 'inline-block' : 'none';
    ansBtn.textContent = '答えを見る';
    ansBtn.dataset.showing = 'false';
    ansBtn.dataset.lessonId = lesson.id;
    ansBtn.dataset.atkKey = atk.key;
    ansBtn.onclick = function() {
      const showing = ansBtn.dataset.showing === 'true';
      const lid = ansBtn.dataset.lessonId;
      const akey = ansBtn.dataset.atkKey;
      const container2 = document.getElementById('imgContainer');
      if (showing) {
        const qImgs = IMG_DATA[lid].attacks[akey];
        container2.innerHTML = qImgs.map(img => `<img src="data:image/png;base64,${img}" alt="問題" style="max-width:100%">`).join('');
        ansBtn.textContent = '答えを見る';
        ansBtn.dataset.showing = 'false';
      } else {
        const aImgs = IMG_DATA[lid].answers[akey];
        container2.innerHTML = aImgs.map(img => `<img src="data:image/png;base64,${img}" alt="解答" style="max-width:100%">`).join('');
        ansBtn.textContent = '問題に戻る';
        ansBtn.dataset.showing = 'true';
      }
    };
  }
  document.getElementById('viewerBackBtn').onclick = () => {
    selectLesson(lesson);
  };

  const tabsEl = document.getElementById('variantTabs');
  const container = document.getElementById('imgContainer');

  if (atk.key === '3' && imgs.length > 1) {
    // ③バリアントタブ表示
    tabsEl.style.display = 'flex';
    tabsEl.innerHTML = '';
    imgs.forEach((img, i) => {
      const tab = document.createElement('button');
      tab.className = 'variant-tab' + (i === 0 ? ' active' : '');
      tab.textContent = `③-${i+1}`;
      tab.onclick = () => {
        tabsEl.querySelectorAll('.variant-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        showImg(container, imgs[i]);
      };
      tabsEl.appendChild(tab);
    });
    showImg(container, imgs[0]);
  } else {
    tabsEl.style.display = 'none';
    tabsEl.innerHTML = '';
    // 複数ページなら縦並び
    if (imgs.length > 1) {
      container.innerHTML = imgs.map(img =>
        `<img src="data:image/png;base64,${img}" alt="プリント">`
      ).join('');
    } else {
      showImg(container, imgs[0]);
    }
  }

  setBreadcrumb(`${lesson.label} › アタック${atk.num}`);
  showScreen('viewer');
}

function openTobira() {
  const d = IMG_DATA['tobira'];
  document.getElementById('viewerTitle').textContent = '学びのとびら';
  document.getElementById('viewerBackBtn').onclick = goHome;
  document.getElementById('variantTabs').style.display = 'none';
  document.getElementById('variantTabs').innerHTML = '';
  const container = document.getElementById('imgContainer');
  container.innerHTML = d.images.map(img =>
    `<img src="data:image/png;base64,${img}" alt="学びのとびら" style="margin-bottom:8px">`
  ).join('');
  setBreadcrumb('学びのとびら');
  showScreen('viewer');
}

function showImg(container, b64) {
  container.innerHTML = `<img src="data:image/png;base64,${b64}" alt="プリント">`;
}

/* ---- nav helpers ---- */
function goHome() {
  setBreadcrumb('');
  showScreen('home');
}
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  window.scrollTo({top:0, behavior:'smooth'});
}
function setBreadcrumb(text) {
  document.getElementById('breadcrumb').textContent = text;
}

buildLessonGrid();
(function(){var t=document.querySelector('.tobira-card');var d=IMG_DATA['tobira'];if(t&&(!d||!d.images||!d.images.length))t.style.display='none';})();
